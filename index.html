<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    text-align: center;
    margin-top: 100px;
    font-family: 'Georgia', serif;
    background: #f8f7f4;
  }

  .player-container {
    display: inline-block;
    cursor: pointer;
    padding: 20px;
  }

  .progress-bar {
    width: 220px;
    height: 4px;
    background: #d6d3cd;
    margin: 30px auto;
    border-radius: 2px;
  }

  .play-button {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid #6b705c;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    font-size: 28px;
    color: #6b705c;
    transition: 0.3s;
  }

  .play-button:hover {
    background: #6b705c20;
  }

  .caption {
    margin-top: 20px;
    font-size: 13px;
    color: #6b705c;
    letter-spacing: 2px;
  }
</style>
</head>

<body>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="player-container" onclick="toggleMusic()">
  <div class="progress-bar"></div>
  <div id="playBtn" class="play-button">▶</div>
  <div class="caption">ESCUCHA NUESTRA CANCIÓN</div>
</div>

<script>
  const music = document.getElementById('music');
  const playBtn = document.getElementById('playBtn');
  let isPlaying = false;

  function toggleMusic() {
    if(isPlaying) {
      music.pause();
      playBtn.textContent = "▶";
      isPlaying = false;
    } else {
      music.play();
      playBtn.textContent = "⏸";
      isPlaying = true;
    }
  }
</script>

</body>
</html>
