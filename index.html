<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    text-align: center;
    margin-top: 80px; /* 👈 esto lo centra como antes */
    background: transparent; /* 👈 sin fondo */
    font-family: 'Georgia', serif;
  }

  .player {
  display: flex;
  flex-direction: column;
  align-items: center; /* 🔥 esto centra TODO */
  }

  .play-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    font-size: 28px;
    color: #ffffff;
    cursor: pointer;
    transition: 0.3s;
    background: transparent;
  }

  .play-btn:hover {
    background: rgba(107,112,92,0.1);
  }

  .progress-container {
    width: 200px;
    height: 4px;
    background: rgba(214,211,205,0.6);
    margin: 20px auto;
    border-radius: 2px;
    cursor: pointer;
    overflow: hidden;
  }

  .progress {
    height: 100%;
    width: 0%;
    background: #ffffff;
  }

  .caption {
    margin-top: 10px;
    font-size: 12px;
    color: #ffffff;
    letter-spacing: 2px;
  }
</style>
</head>

<body>

<audio id="audio" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="player">
  <div id="playBtn" class="play-btn">▶</div>

  <div class="progress-container" id="progressContainer">
    <div class="progress" id="progress"></div>
  </div>

  <div class="caption">ESCUCHA NUESTRA CANCIÓN</div>
</div>

<script>
  const audio = document.getElementById("audio");
  const playBtn = document.getElementById("playBtn");
  const progress = document.getElementById("progress");
  const progressContainer = document.getElementById("progressContainer");

  playBtn.addEventListener("click", () => {
    if (audio.paused) {
      audio.play();
      playBtn.textContent = "⏸";
    } else {
      audio.pause();
      playBtn.textContent = "▶";
    }
  });

  audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + "%";
  });

  progressContainer.addEventListener("click", (e) => {
    const width = progressContainer.clientWidth;
    const clickX = e.offsetX;
    audio.currentTime = (clickX / width) * audio.duration;
  });
</script>

</body>
</html>
